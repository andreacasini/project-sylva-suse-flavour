units:
  logging:
    enabled: false                                                              # saving resources
  monitoring:
    enabled: false                                                              # saving resources
  harbor:
    enabled: false  
  coredns:
    helmrelease_spec:
      chart:
        spec:
          version: "1.44.300"
  multus:
    enabled: true
    helmrelease_spec:
      chart:
        spec:
          version: "v4.2.300"
      values:
        global:
          systemDefaultRegistry: registry.suse.com
  metallb:
    helm_repo_url: oci://registry.suse.com/edge/charts
    helmrelease_spec:
      chart:
        spec:
          version: "305.0.1+up0.15.2"
  longhorn-crd:
    enabled: true
    helmrelease_spec:
      chart:
        spec:
          version: "107.2.0+up1.10.1"
  longhorn:
    enabled: true
    helmrelease_spec:
      chart:
        spec:
          version: "107.2.0+up1.10.1"
      values:
        persistence:
          defaultClassReplicaCount: 1
        global:
          cattle:
            systemDefaultRegistry: registry.suse.com
